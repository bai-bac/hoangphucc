<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🔥 BACCARAT AI ULTRA</title>

<style>
body{
  margin:0;
  background:#06121f;
  font-family:Arial;
  color:#fff;
  text-align:center;
}

.header{
  background:linear-gradient(to right,#0d2b4d,#1f4f7a);
  padding:15px;
  font-size:20px;
  font-weight:bold;
}

/* BUTTON */
.btn{
  padding:18px;
  margin:8px;
  width:30%;
  max-width:140px;
  border:none;
  border-radius:14px;
  color:#fff;
  font-size:18px;
  font-weight:bold;
}
.btn:active{transform:scale(0.95)}
.b{background:#2196F3}
.p{background:#f44336}
.t{background:#4CAF50}

/* BOX */
.box{
  background:#0f243c;
  margin:10px;
  padding:12px;
  border-radius:12px;
}

/* ROAD */
.grid{
  display:grid;
  grid-template-columns: repeat(12, 22px);
  gap:5px;
  justify-content:center;
}
.cell{
  width:22px;
  height:22px;
  border-radius:50%;
}

/* ALERT */
.good{background:#4CAF50;padding:10px;border-radius:8px;}
.warn{background:#ff9800;color:#000;padding:10px;border-radius:8px;}
.danger{background:#f44336;padding:10px;border-radius:8px;}

</style>
</head>

<body>

<div class="header">🔥 BACCARAT AI ULTRA</div>

<div style="display:flex;justify-content:center;flex-wrap:wrap;">
  <button class="btn b" onclick="add('B')">BANKER</button>
  <button class="btn t" onclick="add('T')">TIE</button>
  <button class="btn p" onclick="add('P')">PLAYER</button>
</div>

<div class="box">
  <div id="result">Đang phân tích...</div>
  <div id="warn"></div>
</div>

<div class="grid" id="grid"></div>

<div style="margin-top:10px">
  <button onclick="undo()">Undo</button>
  <button onclick="reset()">Reset</button>
</div>

<script>
let data = JSON.parse(localStorage.getItem("bac")||"[]");

function save(){localStorage.setItem("bac",JSON.stringify(data));}
function add(x){data.push(x); if(data.length>150)data.shift(); save(); render();}
function undo(){data.pop(); save(); render();}
function reset(){data=[]; save(); render();}

/* ===== AI ULTRA ===== */
function analyze(){

  let clean = data.filter(x=>x!="T");

  if(clean.length<6){
    return ["⏳ CHỜ THÊM", "", ""];
  }

  let last20 = clean.slice(-20);
  let last10 = clean.slice(-10);

  let b20 = last20.filter(x=>x=="B").length;
  let p20 = last20.filter(x=>x=="P").length;

  let pb = p20/(b20+p20);
  let bb = 1-pb;

  /* streak */
  let streak=1;
  for(let i=data.length-1;i>0;i--){
    if(data[i]==data[i-1]) streak++;
    else break;
  }

  /* chop */
  let change=0;
  for(let i=1;i<last20.length;i++){
    if(last20[i]!=last20[i-1]) change++;
  }
  let chop = change/last20.length;

  let result="❌ BỎ";
  let warn="";
  let type="";

  /* danger */
  if(streak>=5){
    warn="🚨 Bệt dài → dễ gãy mạnh";
    type="danger";
  }

  if(chop>0.6){
    warn="⚠️ Cầu loạn → KHÔNG NÊN ĐÁNH";
    type="warn";
    return ["❌ BỎ", warn, type];
  }

  /* quyết định */
  if(pb>0.7 && last10.filter(x=>"P").length>=6){
    result="🔥 PLAYER MẠNH";
    type="good";
  }
  else if(bb>0.7 && last10.filter(x=>"B").length>=6){
    result="🔥 BANKER MẠNH";
    type="good";
  }
  else if(streak>=3){
    result="⚡ THEO CẦU " + data[data.length-1];
  }
  else if(pb>0.6){
    result="👉 NGHIÊNG PLAYER";
  }
  else if(bb>0.6){
    result="👉 NGHIÊNG BANKER";
  }

  return [result,warn,type];
}

/* RENDER */
function render(){

  let [r,w,t]=analyze();

  document.getElementById("result").innerText=r;

  let warnBox=document.getElementById("warn");
  warnBox.className="";
  if(t) warnBox.classList.add(t);
  warnBox.innerText=w||"";

  let grid=document.getElementById("grid");
  grid.innerHTML="";

  data.forEach(x=>{
    let d=document.createElement("div");
    d.className="cell";

    if(x=="B") d.style.background="#2196F3";
    if(x=="P") d.style.background="#f44336";
    if(x=="T") d.style.background="#4CAF50";

    grid.appendChild(d);
  });
}

render();
</script>

</body>
</html>
