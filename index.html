<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🎯 Baccarat Timing Tool</title>

<style>
body{
  margin:0;
  background:#071a2b;
  font-family:Arial;
  color:#fff;
  text-align:center;
}

.header{
  background:#0d2b4d;
  padding:15px;
  font-size:20px;
  font-weight:bold;
}

.wrap{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:15px;
}

.btn{
  flex:1;
  padding:18px;
  border:none;
  border-radius:15px;
  font-size:18px;
  font-weight:bold;
  color:#fff;
}

.blue{background:#1e88e5;}
.red{background:#e53935;}
.green{background:#43a047;}

.box{
  background:#10263f;
  margin:10px;
  padding:15px;
  border-radius:12px;
}

.result{
  font-size:22px;
  margin-top:10px;
}

.grid{
  display:grid;
  grid-template-columns: repeat(12, 22px);
  gap:5px;
  justify-content:center;
  margin-top:10px;
}

.cell{
  width:22px;
  height:22px;
  border-radius:50%;
}

.warn{
  background:#ff9800;
  color:#000;
  padding:8px;
  border-radius:8px;
  margin-top:10px;
}

.good{
  background:#4CAF50;
  padding:8px;
  border-radius:8px;
  margin-top:10px;
}

.bad{
  background:#f44336;
  padding:8px;
  border-radius:8px;
  margin-top:10px;
}

.footer{
  margin:15px;
}

</style>
</head>

<body>

<div class="header">🎯 TOOL TIMING CHUẨN</div>

<div class="wrap">
  <button class="btn blue" onclick="add('P')">XANH</button>
  <button class="btn green" onclick="add('T')">HOÀ</button>
  <button class="btn red" onclick="add('B')">ĐỎ</button>
</div>

<div class="box">
  🤖 PHÂN TÍCH THỜI ĐIỂM
  <div id="result" class="result">⏳ CHỜ DỮ LIỆU</div>
  <div id="note"></div>
</div>

<div class="grid" id="grid"></div>

<div class="footer">
  <button onclick="undo()">↩️ Undo</button>
  <button onclick="reset()">🔄 Reset</button>
</div>

<script>
let data = JSON.parse(localStorage.getItem("bac")||"[]");

function save(){
  localStorage.setItem("bac",JSON.stringify(data));
}

function add(x){
  data.push(x);
  if(data.length>100)data.shift();
  save();
  render();
}

function undo(){
  data.pop();
  save();
  render();
}

function reset(){
  data=[];
  save();
  render();
}

/* 🔥 TOOL TIMING */
function analyze(){

  let clean = data.filter(x=>x!="T");

  if(clean.length < 5){
    return ["⏳ CHỜ THÊM","", "bad"];
  }

  /* streak */
  let streak = 1;
  for(let i=clean.length-1;i>0;i--){
    if(clean[i]==clean[i-1]) streak++;
    else break;
  }

  let last = clean[clean.length-1];

  /* cầu loạn */
  let change = 0;
  for(let i=1;i<clean.length;i++){
    if(clean[i] != clean[i-1]) change++;
  }

  let chaos = change / clean.length;

  /* 🚫 cầu loạn */
  if(chaos > 0.6){
    return ["🚫 CẦU LOẠN → NGHỈ","", "bad"];
  }

  /* 🚫 cuối chuỗi */
  if(streak >= 4){
    return ["⛔ CUỐI CẦU → KHÔNG VÀO","Dễ gãy", "bad"];
  }

  /* 🔥 đầu chuỗi đẹp */
  if(streak == 2 || streak == 3){
    return ["🔥 THEO CẦU " + last,"Đang đầu chuỗi", "good"];
  }

  /* 🎯 bắt gãy */
  if(streak == 1 && clean.length > 3){
    return ["🎯 BẮT GÃY " + (last=="P"?"ĐỎ":"XANH"),"Vừa đảo cầu", "good"];
  }

  return ["❌ BỎ","", "bad"];
}

function render(){

  let [res,note,type]=analyze();

  let r=document.getElementById("result");
  let n=document.getElementById("note");

  r.innerText=res;
  n.innerText=note;

  r.className="result";

  if(type=="good") n.className="good";
  else if(type=="bad") n.className="bad";
  else n.className="warn";

  let grid=document.getElementById("grid");
  grid.innerHTML="";

  data.forEach(x=>{
    let d=document.createElement("div");
    d.className="cell";

    if(x=="P") d.style.background="#1e88e5";
    if(x=="B") d.style.background="#e53935";
    if(x=="T") d.style.background="#43a047";

    grid.appendChild(d);
  });
}

render();
</script>

</body>
</html>
