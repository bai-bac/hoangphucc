<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🔥 BACCARAT AI ULTRA</title>

<style>
body{
  margin:0;
  background:#071a2b;
  font-family:Arial;
  color:#fff;
  text-align:center;
}

/* HEADER */
.header{
  background:linear-gradient(to right,#0d2b4d,#1f5fa3);
  padding:18px;
  font-size:22px;
  font-weight:bold;
}

/* BUTTON */
.wrap{
  display:flex;
  justify-content:center;
  gap:12px;
  margin:20px;
}

.btn{
  flex:1;
  padding:18px;
  border:none;
  border-radius:18px;
  font-size:18px;
  font-weight:bold;
  color:#fff;
}

.blue{
  background:#1e88e5;
  box-shadow:0 0 20px #1e88e5;
}

.red{
  background:#e53935;
  box-shadow:0 0 20px #e53935;
}

.green{
  background:#43a047;
  box-shadow:0 0 20px #43a047;
}

/* BOX */
.box{
  background:#0f2a45;
  margin:15px;
  padding:15px;
  border-radius:15px;
}

/* RESULT */
.result{
  font-size:22px;
  font-weight:bold;
  margin-top:10px;
}

.sub{
  font-size:14px;
  opacity:0.7;
}

/* STATS */
.stats{
  display:flex;
  justify-content:space-around;
  margin-top:15px;
  font-size:18px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns: repeat(12, 22px);
  gap:6px;
  justify-content:center;
  margin-top:15px;
}

.cell{
  width:22px;
  height:22px;
  border-radius:50%;
}

/* FOOT */
.footer{
  margin:20px;
}

.btn2{
  padding:12px 25px;
  border:none;
  border-radius:12px;
  margin:5px;
  font-size:16px;
}

/* WARN */
.warn{
  background:#ff9800;
  color:#000;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}

</style>
</head>

<body>

<div class="header">🔥 BACCARAT AI ULTRA</div>

<div class="wrap">
  <button class="btn blue" onclick="add('P')">XANH<br>(PLAYER)</button>
  <button class="btn green" onclick="add('T')">XANH LÁ<br>(TIE)</button>
  <button class="btn red" onclick="add('B')">ĐỎ<br>(BANKER)</button>
</div>

<div class="box">
  🤖 AI ĐANG PHÂN TÍCH...
  <div class="result" id="result">⏳ CHỜ THÊM DỮ LIỆU</div>
  <div class="sub">Nhập kết quả để AI dự đoán chính xác hơn</div>

  <div class="stats">
    <div style="color:#1e88e5">XANH <br><span id="p">0%</span></div>
    <div style="color:#e53935">ĐỎ <br><span id="b">0%</span></div>
    <div style="color:#ffeb3b">BỆT <br><span id="streak">0</span></div>
  </div>

  <div id="warn"></div>
</div>

<div class="grid" id="grid"></div>

<div class="footer">
  <button class="btn2" onclick="undo()">↩️ Hoàn tác</button>
  <button class="btn2" onclick="reset()">🔄 Reset</button>
</div>

<script>
let data = JSON.parse(localStorage.getItem("bac")||"[]");

function save(){
  localStorage.setItem("bac",JSON.stringify(data));
}

function add(x){
  data.push(x);
  if(data.length>120)data.shift();
  save();
  render();
}

function undo(){
  data.pop();
  save();
  render();
}

function reset(){
  data=[];
  save();
  render();
}

function analyze(){
  let last=data.slice(-20);

  let p=last.filter(x=>x=="P").length;
  let b=last.filter(x=>x=="B").length;
  let total=p+b;

  if(total==0)return [0,0,"⏳ CHỜ THÊM",0,""];

  let pp=Math.round(p/total*100);
  let bb=100-pp;

  /* streak */
  let streak=1;
  for(let i=data.length-1;i>0;i--){
    if(data[i]==data[i-1]) streak++;
    else break;
  }

  let result="⏳ CHỜ";
  let warn="";

  if(streak>=4){
    warn="⚠️ Cầu bệt "+streak+" → dễ gãy!";
  }

  if(pp>65){
    result="🔥 XANH MẠNH (PLAYER)";
  }
  else if(bb>65){
    result="🔥 ĐỎ MẠNH (BANKER)";
  }
  else if(streak>=3){
    result="⚡ Theo cầu: "+(data[data.length-1]=="P"?"XANH":"ĐỎ");
  }

  return [pp,bb,result,streak,warn];
}

function render(){
  let [pp,bb,res,streak,warn]=analyze();

  document.getElementById("p").innerText=pp+"%";
  document.getElementById("b").innerText=bb+"%";
  document.getElementById("streak").innerText=streak;
  document.getElementById("result").innerText=res;

  let w=document.getElementById("warn");
  if(warn){
    w.className="warn";
    w.innerText=warn;
  }else{
    w.className="";
    w.innerText="";
  }

  let grid=document.getElementById("grid");
  grid.innerHTML="";

  data.forEach(x=>{
    let d=document.createElement("div");
    d.className="cell";

    if(x=="P") d.style.background="#1e88e5";
    if(x=="B") d.style.background="#e53935";
    if(x=="T") d.style.background="#43a047";

    grid.appendChild(d);
  });
}

render();
</script>

</body>
</html>
